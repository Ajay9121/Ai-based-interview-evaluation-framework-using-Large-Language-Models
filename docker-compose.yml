version: '3.8'

services:
  spring-boot:
    build:
      context: ./spring-boot-backend
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - JWT_SECRET=mySecretKeyForInterviewAppMustBeAtLeast256BitsLongForHS256Algorithm
      - PYTHON_AI_URL=http://python-ai:8000
      - SQLITE_DB_PATH=/app/data/interview.db
      - UPLOAD_DIR=/app/uploads
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    depends_on:
      - python-ai

  python-ai:
    build:
      context: ./python-ai-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-your_gemini_key_here}
      - GEMINI_MODEL=gemini-2.0-flash

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - spring-boot
